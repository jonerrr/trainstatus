# [tasks.start-containers]
# run = "podman compose up -d"

[tasks.csp]
run = "cargo sqlx prepare"

[tasks.migrate]
run = "sqlx migrate run"

[tasks.dev]
depends = ["//backend:migrate"]
run = "cargo run"

[tasks.test]
env = { SQLX_OFFLINE = "true", DATABASE_URL = "postgres://trains:trains@localhost:5432/trains" }
run = "cargo test"

[tasks.reset-db]
confirm = "Are you sure?"
run = """
podman compose -f ../compose.dev.yml down -v
podman compose -f ../compose.dev.yml up -d
"""
depends_post = ["//backend:migrate"]

[env]
VALHALLA_CONFIG = "../geo/data/valhalla.json"
# RUST_LOG = "backend=debug"
