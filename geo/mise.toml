[tasks.build-data]
run = "podman build -f Dockerfile -t trainstatus-geo-data ."
# TODO: fix paths inside valhalla.json

[tasks.export-generated-data]
description = "Copy generated geo artifacts from a container image into ./data"
run = """
set -eu

image="${IMAGE:-trainstatus-geo-data}"
out_dir="${MISE_PROJECT_ROOT:-$PWD}/data"
container_id="$(podman create "$image")"

cleanup() {
	podman rm -f "$container_id" >/dev/null 2>&1 || true
}
trap cleanup EXIT

mkdir -p "$out_dir"

podman cp "$container_id:/data/valhalla.json" "$out_dir/valhalla.json"
podman cp "$container_id:/data/valhalla_tiles.tar" "$out_dir/valhalla_tiles.tar"
podman cp "$container_id:/data/basemap.pmtiles" "$out_dir/basemap.pmtiles"

sed -i 's#"tile_extract": "/data/valhalla_tiles.tar"#"tile_extract": "'"$out_dir"'/valhalla_tiles.tar"#' "$out_dir/valhalla.json"

echo "Copied artifacts from $image to $out_dir"
"""

