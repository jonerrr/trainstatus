route_prefix: /martin

postgres:
  # The connection URL will be read from DATABASE_URL env var
  connection_string: $DATABASE_URL

  auto_publish:
    tables:
      from_schemas:
        - static
      # must be integer (but we are using string)
      # id_columns: id
    # TODO: add back functions once they are fixed
    # functions:
    #   from_schemas:
    #     - realtime

sprites:
  paths:
    - /sprites/dark-matter
    - /sprites/frontend

styles:
  paths:
    - /styles

fonts:
  paths:
    - /fonts

# mbtiles:
#   sources:
#     basemap: /data/basemap.mbtiles

pmtiles:
  sources:
    basemap: /data/basemap.pmtiles

# should be disabled in prod
web_ui: enable-for-all

cors: false
