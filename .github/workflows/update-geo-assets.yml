name: Update Geo Assets

on:
    workflow_dispatch:
        inputs:
            style_base_urls:
                description: Comma-separated base URLs for generated style JSON files
                required: false
                default: "http://localhost:5173,https://trainstat.us"

permissions:
    contents: read
    packages: write

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Login to GitHub Container Registry
              uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels) for Docker
              id: meta
              uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
              with:
                  images: ghcr.io/${{ github.repository_owner }}/trainstatus-geo-assets
                  tags: |
                      latest

            - name: Build and push Docker image
              uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
              with:
                  context: ./geo
                  file: ./geo/Dockerfile.assets
                  push: true
                  build-args: |
                      STYLE_BASE_URLS=${{ inputs.style_base_urls || 'http://localhost:5173,https://trainstat.us' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
