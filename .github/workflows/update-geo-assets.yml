name: Update Geo Assets

on:
    workflow_dispatch:
        inputs:
            base_url:
                description: Base URL to embed in style JSON references
                required: false
                default: https://trainstat.us

permissions:
    contents: read
    packages: write

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Login to GitHub Container Registry
              uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels) for Docker
              id: meta
              uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
              with:
                  images: ghcr.io/${{ github.repository_owner }}/trainstatus-geo-assets
                  tags: |
                      latest

            - name: Build and push Docker image
              uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
              with:
                  context: ./geo
                  file: ./geo/Dockerfile.assets
                  push: true
                  build-args: |
                      BASE_URL=${{ inputs.base_url || 'https://trainstat.us' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
