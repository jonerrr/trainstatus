name: release-please

on:
    push:
        branches:
            - master

permissions:
    contents: write
    issues: write
    pull-requests: write
    packages: write

concurrency:
    group: release-please
    cancel-in-progress: false

jobs:
    release-please:
        runs-on: ubuntu-latest
        outputs:
            release_created: ${{ steps.release.outputs.releases_created }}
            version: ${{ steps.release.outputs['backend--version'] }} # versions will always be synced
        steps:
            - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
              id: release
              with:
                  config-file: release-please-config.json
                  manifest-file: .release-please-manifest.json
                  target-branch: master

    build-and-push:
        needs:
            - release-please
        if: ${{ needs.release-please.outputs.release_created == 'true' }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - component: backend
                      context: ./backend
                      image: ghcr.io/${{ github.repository_owner }}/trainstatus-backend
                    - component: frontend
                      context: ./frontend
                      image: ghcr.io/${{ github.repository_owner }}/trainstatus-frontend

        permissions:
            contents: read
            packages: write

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels) for Docker
              id: meta
              uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
              with:
                  images: ${{ matrix.image }}
                  tags: |
                      latest
                      ${{ needs.release-please.outputs.version }}

            - name: Build and push Docker image
              uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
              with:
                  context: ${{ matrix.context }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
